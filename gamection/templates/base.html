<!DOCTYPE html>
<html lang="pt-br"> 
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block titulo %}Nossa LanHouse {% endblock %} </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('games.index') }}">Gamection</a>
        <div class="navbar-nav">
          <a class="nav-link" href="{{ url_for('games.listar_jogos') }}">Listar Livros</a>
          <a class="nav-link" href="{{ url_for('games.cadastrar_jogo') }}">Cadastrar Novo</a>
        </div>
      </div>
    </nav>

    <div class="container">
      {% with messages=get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}
      {% endblock %}
    </div>
  </body>
</html>
