<!DOCTYPE html>
<html lang="pt-br"> 
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block titulo %}Nossa LanHouse {% endblock %} </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>

      </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('games.index') }}">Gamection</a>
        <div class="navbar-nav">
          <a class="nav-link" href="{{ url_for('games.listar_jogos') }}">Jogos</a>
          <a class="nav-link" href="{{ url_for('user.cadastrar_user') }}">Cadastro</a>
          <a class="nav-link" href="{{url_for('user.login')}}">Login</a>
        </div>
      </div>
      <div>
        {% if session.get('usuário') %}
        <form action="{{url_for('user.sair')}}" method="POST">
          <button type="submit">SAIR</button>
        </form>
        <label style="color: white;">{{session.get("usuário")}}</label>
        {% endif %}
      </div>
    </nav>

    <div class="container">
      {% with messages=get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>

          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}
      {% endblock %}
    </div>
  </body>
</html>
