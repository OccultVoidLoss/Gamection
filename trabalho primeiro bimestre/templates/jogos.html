{% extends 'base.html' %}
{% block titulo %} Coleção {% endblock %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Jogos Cadastrados</h3>
    <a href="{{ url_for('games.cadastrar_jogo') }}" class="btn btn-primary">+ Novo Jogo</a>
  </div>
  <nav class="navbar navbar-light bg-light">
  <form class="form-inline">
    <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
    <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
  </form>
</nav>
  {% for jogo in jogos %}
  <a href="{{url_for('games.detalhe', id= jogo.id)}}">
  <img src=" {{url_for('static', filename = 'uploads/' + jogo.img)}}">
  </a>
  {% endfor %}
  
{% endblock %}
